usage: >-
  `oi-text-effect` — 16 text effect presets across 7 categories (entrance, sweep, scramble, flip, morph, shimmer, typewriter) for React and vanilla HTML. Say the effect name to generate a preview, or say "text effect" to browse all variants in the showcase page.
usage_zh: >-
  `oi-text-effect` — 7 大类 16 种文字动效预设（分段进入、扫光、乱码解密、3D翻转、变形、流光、打字机），支持 React 与纯 HTML。说出效果名即可生成预览，或说「文字动效」浏览样板页 `text-effect-showcase.html`。
