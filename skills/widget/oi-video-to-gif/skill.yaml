# Metadata for this skill only (not installed to agents). Used by repo scripts + docs.
name: oi-video-to-gif
category: widget
status: stable
author: Shicheng

description: Convert local MP4/MOV to GIF with drop-cycle frame levels, optional crop, delay, scale, loss
description_zh: 本地视频转 GIF，抽帧等级（2留1丢循环）、可选裁切、帧间隔、缩放与画质 loss

triggers:
  - oi-video-to-gif
  - video to gif
  - mp4 to gif
  - mov to gif
  - convert video to gif
  - crop video to gif
  - 视频转 gif
  - 视频转GIF
  - 裁切转 gif
  - 转成 gif
  - Video2Gif

requires:
  - python>=3.9
  - ffmpeg
  - ffprobe

usage: >-
  `oi-video-to-gif`, mp4/mov to gif, 视频转 GIF; see SKILL.md Usage for CLI.
usage_zh: >-
  用户问 usage/怎么用 时，朗读 SKILL.md 的 Usage 小节。
